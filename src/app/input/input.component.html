<div class="input">
  <label>{{ label }}</label>
  <input
    [type]="type"
    [(ngModel)]="value"
    [disabled]="disabled"
    (input)="onchange(value)"
    [placeholder]="placeholder"
    (blur)="ontouched()"
    [class.invalid]="isInvalid"
  />
  @if(isInvalid && error){
    <span class="error">{{ error }}</span>
  }
</div>
